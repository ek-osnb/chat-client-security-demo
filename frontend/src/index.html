<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Demo ChatGPT</title>
</head>
<body>
<header>
    <nav class="navbar">
        <a href="" class="navbar-brand">AI Weather</a>
    </nav>
    <div >
        <p id="user-info" style="margin-right: 1em"></p>
        <button class="btn"  id="logout-button">Logout</button>
    </div>
</header>

<form id="login-form">
    <h1>Login</h1>
    <label for="username">Username:</label>
    <input type="text" id="username" name="username" placeholder="Username" required>
    <label for="password">Password:</label>
    <input type="password" id="password" name="password" placeholder="Password" required>
    <button class="btn" style="margin-top: 1em" type="submit">Login</button>
</form>

<main >
    <div class="chat-container">
        <div id="chat" class="chat-messages">
            <div class="message assistant">
                <div class="bubble">Hello! I'm your weather assistant. Ask me things like <i>"What is the temperature in Copenhagen?"</i></div>
            </div>
        </div>
    </div>
</main>
<div id="input-area" >
    <form id="chat-form" class="chat-input" autocomplete="off">
        <textarea id="prompt" name="prompt" placeholder="Ask about the weather..." required></textarea>
        <button type="submit" title="Send">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </form>
</div>

</body>
<script type="module" src="./js/app.js"></script>
</html>
